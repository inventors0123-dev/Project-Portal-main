services:
  - type: web
    name: project-portal
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python init_db.py && gunicorn app:app
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false
      - key: DRIVE_PARENT_FOLDER_ID
        sync: false
      - key: SEND_PERMISSION_EMAIL
        value: "true"
